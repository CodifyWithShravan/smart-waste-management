; PlatformIO Project Configuration File
; Smart Waste Management - ESP32 LoRa-to-USB Bridge (Receiver)
;
; Hardware:
;   Board: ESP32 DOIT DevKit V1
;   Communication: REYAX RYLR998 LoRa Module
;   Connection: ESP32 USB → Raspberry Pi

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
